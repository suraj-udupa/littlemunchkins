services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lm
      POSTGRES_PASSWORD: lm
      POSTGRES_DB: littlemunchkins
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Creates the bucket in MinIO on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/littlemunchkins-media;
        exit 0;
      "

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=littlemunchkins;Username=lm;Password=lm"
      BUCKET_NAME: littlemunchkins-media
      BUCKET_ENDPOINT: http://minio:9000
      BUCKET_ACCESS_KEY_ID: minioadmin
      BUCKET_SECRET_ACCESS_KEY: minioadmin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
